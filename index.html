<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office of Nils Johansson</title>
  <meta name="description" content="A digital hub for field engineering projects, technical writing, and tools built from real-world deployments.">
  <meta name="author" content="Nils Johansson">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="icon" href="/assets/images/apple-touch-icon.png">

  <!-- Google Fonts: Nunito (rounded gothic display font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <!-- ─── Navigation ─── -->
  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="#" class="nav-brand" id="nav-brand"></a>
      <div class="nav-links" id="nav-links"></div>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path id="menu-icon-path" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobile-menu"></div>

  <main>

    <!-- ─── Hero ─── -->
    <section class="hero" id="home">
      <p class="hero-role" id="hero-role"></p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-description" id="hero-description"></p>
      <div class="hero-actions">
        <a href="#projects" class="btn-primary">
          View Projects
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#about" class="btn-secondary">About Me</a>
      </div>
    </section>

    <!-- ─── Projects ─── -->
    <section class="section" id="projects">
      <div class="container">
        <div class="section-header">
          <h2>Featured Projects</h2>
          <p>Tools, writing, and resources built from real-world engineering deployments.</p>
        </div>
        <div class="card-grid" id="projects-grid"></div>
      </div>
    </section>

    <!-- ─── Journal ─── -->
    <section class="section section-alt" id="journal">
      <div class="container">
        <div class="section-header">
          <h2>From the Journal</h2>
          <p>Technical dispatches and reflections from the field.</p>
        </div>
        <div class="journal-grid" id="journal-grid"></div>
        <div class="read-all">
          <a href="/blog/">
            Read all posts
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </section>

    <!-- ─── About ─── -->
    <section class="section" id="about">
      <div class="container">
        <div class="about-layout">
          <img id="about-photo" alt="Nils Johansson" class="about-photo" loading="lazy">
          <div class="about-content">
            <h2>About</h2>
            <p class="about-bio" id="about-bio"></p>
            <div class="social-links" id="social-links"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ─── Footer ─── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span id="footer-copyright"></span>
      <div class="footer-links" id="footer-links"></div>
    </div>
  </footer>

  <!-- ─── Scripts ─── -->
  <script src="/config.js"></script>
  <script>
    (function () {
      "use strict";

      function icon(name, cls) {
        var d = CONFIG.icons[name];
        if (!d) return "";
        return '<svg class="' + (cls || "") + '" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="' + d + '"/></svg>';
      }

      function $(sel) { return document.querySelector(sel); }

      /* ── Hero ── */
      $("#hero-role").textContent = CONFIG.author.role;
      $("#hero-title").textContent = CONFIG.site.title;
      $("#hero-description").textContent = CONFIG.site.description;

      /* ── Navigation ── */
      $("#nav-brand").textContent = CONFIG.author.name;

      $("#nav-links").innerHTML = CONFIG.navigation
        .map(function (n) { return '<a href="#' + n.id + '">' + n.label + '</a>'; })
        .join("");

      $("#mobile-menu").innerHTML = CONFIG.navigation
        .map(function (n) { return '<a href="#' + n.id + '" class="mobile-nav-link">' + n.label + '</a>'; })
        .join("");

      /* ── Mobile menu toggle ── */
      var menuBtn = $("#mobile-menu-btn");
      var mobileMenu = $("#mobile-menu");
      var menuIconPath = $("#menu-icon-path");
      var menuOpen = false;

      menuBtn.addEventListener("click", function () {
        menuOpen = !menuOpen;
        mobileMenu.classList.toggle("open", menuOpen);
        menuIconPath.setAttribute("d", menuOpen ? CONFIG.icons.close : CONFIG.icons.menu);
      });

      document.querySelectorAll(".mobile-nav-link").forEach(function (link) {
        link.addEventListener("click", function () {
          menuOpen = false;
          mobileMenu.classList.remove("open");
          menuIconPath.setAttribute("d", CONFIG.icons.menu);
        });
      });

      /* ── Nav scroll effect ── */
      var nav = $("#site-nav");
      window.addEventListener("scroll", function () {
        nav.classList.toggle("scrolled", window.scrollY > 20);
      }, { passive: true });

      /* ── Projects grid ── */
      $("#projects-grid").innerHTML = CONFIG.projects.map(function (p) {
        var isDownload = p.url.endsWith(".pdf") || p.url.endsWith(".txt");
        var isExternal = p.url.startsWith("http");
        var attrs = isExternal ? ' target="_blank" rel="noopener"' : "";
        attrs += isDownload ? " download" : "";

        var tags = p.tags.map(function (t) {
          return '<span class="tag">' + t + '</span>';
        }).join("");

        return '<a href="' + p.url + '"' + attrs + ' class="card">' +
          '<div class="card-header">' +
            '<div class="card-icon">' + icon(p.icon) + '</div>' +
            '<div class="card-arrow"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>' +
          '</div>' +
          '<h3>' + p.title + '</h3>' +
          '<p>' + p.description + '</p>' +
          '<div class="card-tags">' + tags + '</div>' +
        '</a>';
      }).join("");

      /* ── Journal posts (WordPress API) ── */
      var WORDPRESS_API = "https://public-api.wordpress.com/wp/v2/sites/theofficeofnils.wordpress.com/posts?_embed&per_page=3";

      function stripHTML(html) {
        var tmp = document.createElement("div");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
      }

      function formatDate(dateStr) {
        return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" }).format(new Date(dateStr));
      }

      fetch(WORDPRESS_API)
        .then(function (res) { return res.json(); })
        .then(function (posts) {
          if (posts.length) {
            $("#journal-grid").innerHTML = posts.map(function (post) {
              var title = stripHTML(post.title.rendered) || "Untitled";
              var excerpt = stripHTML(post.excerpt.rendered).trim();
              var summary = excerpt.length > 140 ? excerpt.slice(0, 137) + "\u2026" : excerpt;

              return '<a href="' + post.link + '" target="_blank" rel="noopener" class="journal-card">' +
                '<time>' + formatDate(post.date) + '</time>' +
                '<h3>' + title + '</h3>' +
                '<p>' + (summary || "Read the full article.") + '</p>' +
              '</a>';
            }).join("");
          } else {
            $("#journal-grid").innerHTML = '<p class="journal-empty">New posts coming soon.</p>';
          }
        })
        .catch(function () {
          $("#journal-grid").innerHTML = '<p class="journal-empty">Could not load posts. <a href="/blog/">Visit the blog directly.</a></p>';
        });

      /* ── About ── */
      $("#about-photo").src = CONFIG.author.photo;
      $("#about-bio").textContent = CONFIG.author.bio;

      $("#social-links").innerHTML = Object.keys(CONFIG.author.social).map(function (key) {
        return '<a href="' + CONFIG.author.social[key] + '" target="_blank" rel="noopener" class="social-link" aria-label="' + key + '">' +
          icon(key) +
        '</a>';
      }).join("");

      /* ── Footer ── */
      $("#footer-copyright").textContent = CONFIG.site.copyright;
      $("#footer-links").innerHTML = Object.keys(CONFIG.author.social).map(function (key) {
        return '<a href="' + CONFIG.author.social[key] + '" target="_blank" rel="noopener">' + key + '</a>';
      }).join("");

      /* ── Smooth scrolling ── */
      document.querySelectorAll('a[href^="#"]').forEach(function (a) {
        a.addEventListener("click", function (e) {
          var target = document.querySelector(a.getAttribute("href"));
          if (target) {
            e.preventDefault();
            target.scrollIntoView({ behavior: "smooth", block: "start" });
            history.pushState(null, "", a.getAttribute("href"));
          }
        });
      });

      /* ── Scroll-triggered reveal ── */
      var reveals = document.querySelectorAll("#projects, #journal, #about");
      reveals.forEach(function (el) { el.classList.add("reveal"); });

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      reveals.forEach(function (el) { observer.observe(el); });

    })();
  </script>
</body>
</html>
