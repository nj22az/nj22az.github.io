<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Office of Nils Johansson</title>
  <meta name="description" content="A digital hub for field engineering projects, technical writing, and tools built from real-world deployments.">
  <meta name="author" content="Nils Johansson">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="icon" type="image/png" href="/assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <nav id="site-nav" class="site-nav"></nav>

  <main>

    <!-- Hero — vertical stack: text + photo -->
    <section class="hero" id="home">
      <div class="container">
        <div class="hero-logo logo-seal" id="hero-logo"></div>
        <p class="hero-role" id="hero-role"></p>
        <h1 class="hero-tagline" id="hero-title"></h1>
        <p class="hero-sub" id="hero-description"></p>
        <div class="hero-actions">
          <a href="#projects" class="btn-primary">
            View Projects
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a href="#about" class="btn-secondary">About Me</a>
        </div>
      </div>
      <div class="hero-photo">
        <img src="/assets/images/nils-lake-hero.jpg" alt="Field engineering in the field" loading="eager">
      </div>
    </section>

    <!-- Schedule — availability table -->
    <section class="section" id="schedule">
      <div class="container">
        <div id="schedule-widget"></div>
      </div>
    </section>

    <!-- Dashed divider -->
    <hr class="section-divider">

    <!-- Projects — bento grid -->
    <section class="section" id="projects">
      <div class="container">
        <div class="section-header">
          <div class="section-decor" id="decor-projects"></div>
          <h2>Featured Projects</h2>
          <div class="section-subtitle">Projects</div>
          <p>Platforms, shops, and profiles where I build, write, and share.</p>
        </div>
        <div class="bento-grid" id="bento-grid"></div>
      </div>
    </section>

    <!-- Dashed divider -->
    <hr class="section-divider">

    <!-- Journal — row-style list -->
    <section class="section section-alt" id="journal">
      <div class="container" style="position:relative; overflow:hidden;">
        <div class="decor-blob decor-blob-md decor-blob-tr"></div>
        <div class="section-header">
          <div class="section-decor" id="decor-journal"></div>
          <h2>From the Journal</h2>
          <div class="section-subtitle">News</div>
          <p>Technical dispatches and reflections from the field.</p>
        </div>
        <div class="journal-list" id="journal-list"></div>
        <div class="read-all">
          <a href="/blog/">
            Read all posts
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </section>

    <!-- Dashed divider -->
    <hr class="section-divider">

    <!-- About — gradient + centered -->
    <section class="section section-mint" id="about">
      <div class="container" style="position:relative; overflow:hidden;">
        <div class="decor-blob decor-blob-lg decor-blob-tr"></div>
        <div class="decor-blob decor-blob-sm decor-blob-bl"></div>
        <div class="about-layout">
          <div id="about-logo" class="about-logo logo-seal"></div>
          <div class="section-label-bar">About</div>
          <div class="about-content">
            <h2 id="about-heading">About</h2>
            <p class="about-bio" id="about-bio"></p>
            <div class="social-links" id="social-links"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Dashed divider -->
    <hr class="section-divider">

    <!-- Locations — map cards -->
    <section class="section" id="locations">
      <div class="container">
        <div class="section-header">
          <div class="section-decor"></div>
          <h2>Locations</h2>
          <div class="section-subtitle">Where I Work</div>
          <p>Based between Sweden and Southeast Asia.</p>
        </div>
        <div class="locations-grid" id="locations-grid"></div>
      </div>
    </section>

  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="/config.js"></script>
  <script src="/shared.js"></script>
  <script>
    (function () {
      "use strict";

      function $(sel) { return document.querySelector(sel); }

      /* Hero */
      $("#hero-logo").innerHTML = CONFIG.logo(120);
      $("#hero-role").textContent = CONFIG.author.role;
      $("#hero-title").textContent = CONFIG.site.tagline;
      $("#hero-description").textContent = CONFIG.site.description;

      /* Hero photo fades out on scroll */
      var heroPhoto = $(".hero-photo");
      if (heroPhoto) {
        window.addEventListener("scroll", function () {
          var rect = heroPhoto.getBoundingClientRect();
          var visible = Math.max(0, Math.min(1, rect.bottom / (window.innerHeight * 0.7)));
          heroPhoto.style.opacity = visible;
        }, { passive: true });
      }

      /* Schedule — interactive week calendar */
      if (CONFIG.author.schedule && CONFIG.author.locations) {
        var sched = CONFIG.author.schedule;
        var locations = CONFIG.author.locations;
        var weekOffset = 0;
        var holidayCache = {}; // key: "year-CC" -> array
        var selectedLocIdx = parseInt(localStorage.getItem("nj-sched-loc") || sched.defaultLocation || "0", 10);
        if (selectedLocIdx >= locations.length) selectedLocIdx = 0;
        var locDropdownOpen = false;
        var legendOpen = false;

        var DAYS = ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"];
        var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        function getWeekNumber(d) {
          var date = new Date(d.getTime());
          date.setHours(0, 0, 0, 0);
          date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
          var week1 = new Date(date.getFullYear(), 0, 4);
          return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        function getMondayOfWeek(offset) {
          var now = new Date();
          var day = now.getDay();
          var diff = now.getDate() - day + (day === 0 ? -6 : 1) + (offset * 7);
          return new Date(now.getFullYear(), now.getMonth(), diff);
        }

        function isSameDay(a, b) {
          return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
        }

        function renderCalendar(holidays) {
          var monday = getMondayOfWeek(weekOffset);
          var wk = getWeekNumber(monday);
          var today = new Date();
          var loc = locations[selectedLocIdx];

          // Build holiday map for this week
          var holidayMap = {};
          if (holidays && holidays.length) {
            for (var h = 0; h < holidays.length; h++) {
              var parts = holidays[h].date.split("-");
              var hDate = new Date(+parts[0], +parts[1] - 1, +parts[2]);
              var diff = Math.round((hDate - monday) / 86400000);
              if (diff >= 0 && diff < 7) {
                holidayMap[diff] = holidays[h].localName || holidays[h].name;
              }
            }
          }

          // Month label
          var sunday = new Date(monday.getTime() + 6 * 86400000);
          var monthLabel = MONTHS[monday.getMonth()];
          if (monday.getMonth() !== sunday.getMonth()) {
            monthLabel = MONTHS[monday.getMonth()] + " – " + MONTHS[sunday.getMonth()];
          }

          // Day cells
          var dayCells = '';
          var FULL_DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
          for (var i = 0; i < 7; i++) {
            var d = new Date(monday.getTime() + i * 86400000);
            var isToday = isSameDay(d, today);
            var isWeekend = i >= 5;
            var isHoliday = !!holidayMap[i];
            var classes = ["schedule-day"];
            if (isToday) classes.push("today");
            if (isWeekend) classes.push("weekend");
            if (isHoliday) classes.push("holiday");

            // Build popup info
            var popupParts = [FULL_DAYS[i] + " " + d.getDate() + " " + MONTHS[d.getMonth()]];
            if (isToday) popupParts.push("Today");
            if (isHoliday) popupParts.push(holidayMap[i]);
            if (isWeekend && !isHoliday) popupParts.push("Weekend");

            dayCells += '<button class="' + classes.join(" ") + '" data-popup="' + popupParts.join(" · ") + '">' +
              '<span class="schedule-day-name">' + DAYS[i] + '</span>' +
              '<span class="schedule-day-num">' + d.getDate() + '</span>' +
            '</button>';
          }

          // Holiday names
          var holidayNames = [];
          for (var idx in holidayMap) { holidayNames.push(holidayMap[idx]); }
          var holidayNote = holidayNames.length ?
            '<p class="schedule-holidays">' + holidayNames.join(" &middot; ") + '</p>' : '';

          // Location dropdown items
          var locItems = '';
          for (var li = 0; li < locations.length; li++) {
            var active = li === selectedLocIdx ? ' active' : '';
            locItems += '<button class="schedule-loc-item' + active + '" data-loc-idx="' + li + '">' +
              locations[li].name + ', ' + locations[li].label + '</button>';
          }

          var pinIcon = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="' + CONFIG.icons.mappin + '"/></svg>';
          var chevLeft = '<svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M15 18l-6-6 6-6"/></svg>';
          var chevRight = '<svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M9 18l6-6-6-6"/></svg>';

          $("#schedule-widget").innerHTML =
            '<div class="schedule-frame">' +
              '<div class="schedule-header">' +
                '<div class="schedule-nav">' +
                  '<button class="schedule-nav-btn" data-dir="-1" aria-label="Previous week">' + chevLeft + '</button>' +
                  '<span class="schedule-week">Wk ' + wk + '</span>' +
                  '<button class="schedule-nav-btn" data-dir="1" aria-label="Next week">' + chevRight + '</button>' +
                '</div>' +
                '<div class="schedule-loc-wrap">' +
                  '<button class="schedule-location" aria-label="Change location">' + pinIcon +
                    '<span class="schedule-location-town">' + loc.name + '</span>, ' +
                    '<span class="schedule-location-country">' + loc.label + '</span>' +
                  '</button>' +
                  '<div class="schedule-loc-dropdown' + (locDropdownOpen ? ' open' : '') + '">' + locItems + '</div>' +
                '</div>' +
                '<span class="schedule-header-right">' +
                  '<span class="schedule-month">' + monthLabel + ' ' + monday.getFullYear() + '</span>' +
                  '<button class="schedule-info-btn' + (legendOpen ? ' active' : '') + '" aria-label="Legend" type="button">i</button>' +
                '</span>' +
              '</div>' +
              '<div class="schedule-legend"' + (legendOpen ? '' : ' hidden') + '>' +
                '<div class="schedule-legend-item"><span class="schedule-legend-dot today-sample"></span> Today</div>' +
                '<div class="schedule-legend-item"><span class="schedule-legend-dot weekend-sample"></span> Weekend</div>' +
                '<div class="schedule-legend-item"><span class="schedule-legend-dot holiday-sample"></span> Holiday</div>' +
              '</div>' +
              '<div class="schedule-days">' + dayCells + '</div>' +
              '<div class="schedule-popup" hidden></div>' +
              holidayNote +
              '<p class="schedule-note">' + sched.note + '</p>' +
            '</div>';

          // Day cell click — show popup
          var popup = document.querySelector(".schedule-popup");
          document.querySelectorAll(".schedule-day").forEach(function (dayEl) {
            dayEl.addEventListener("click", function (e) {
              e.stopPropagation();
              var text = dayEl.dataset.popup;
              if (popup.hidden === false && popup.textContent === text) {
                popup.hidden = true;
                return;
              }
              popup.textContent = text;
              popup.hidden = false;
            });
          });
          document.addEventListener("click", function dismissPopup() {
            if (popup && !popup.hidden) popup.hidden = true;
            document.removeEventListener("click", dismissPopup);
          });

          // Event listeners
          document.querySelectorAll(".schedule-nav-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
              weekOffset += parseInt(btn.dataset.dir, 10);
              fetchAndRender();
            });
          });

          var locBtn = document.querySelector(".schedule-location");
          if (locBtn) {
            locBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              locDropdownOpen = !locDropdownOpen;
              var dd = document.querySelector(".schedule-loc-dropdown");
              if (dd) dd.classList.toggle("open", locDropdownOpen);
            });
          }

          document.querySelectorAll(".schedule-loc-item").forEach(function (item) {
            item.addEventListener("click", function () {
              selectedLocIdx = parseInt(item.dataset.locIdx, 10);
              localStorage.setItem("nj-sched-loc", selectedLocIdx);
              locDropdownOpen = false;
              fetchAndRender();
            });
          });

          var infoBtn = document.querySelector(".schedule-info-btn");
          var legend = document.querySelector(".schedule-legend");
          if (infoBtn && legend) {
            infoBtn.addEventListener("click", function () {
              legendOpen = !legendOpen;
              legend.hidden = !legendOpen;
              infoBtn.classList.toggle("active", legendOpen);
            });
          }

          // Close dropdown on outside click
          document.addEventListener("click", function closeLocDd() {
            if (locDropdownOpen) {
              locDropdownOpen = false;
              var dd = document.querySelector(".schedule-loc-dropdown");
              if (dd) dd.classList.remove("open");
            }
            document.removeEventListener("click", closeLocDd);
          });
        }

        function fetchAndRender() {
          var loc = locations[selectedLocIdx];
          var monday = getMondayOfWeek(weekOffset);
          var year = monday.getFullYear();
          var cc = loc.countryCode;

          if (!cc) { renderCalendar(null); return; }

          var cacheKey = year + "-" + cc;
          if (holidayCache[cacheKey]) {
            renderCalendar(holidayCache[cacheKey]);
            return;
          }

          // Render immediately without holidays, then update
          renderCalendar(null);
          fetch("https://date.nager.at/api/v3/PublicHolidays/" + year + "/" + cc)
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (data) {
              holidayCache[cacheKey] = data;
              renderCalendar(data);
            })
            .catch(function () { /* silent */ });
        }

        fetchAndRender();
      }

      /* Decorative leaf icons above section headers */
      var leafSvg = '<svg fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="' + CONFIG.icons.leaf + '"/></svg>';
      document.querySelectorAll(".section-decor").forEach(function (el) { el.innerHTML = leafSvg; });

      /* Bento grid — project cards */
      $("#bento-grid").innerHTML = CONFIG.projects.map(function (p) {
        var bentoClass = p.bento === "large" ? "bento-large" :
                         p.bento === "wide" ? "bento-wide" :
                         p.bento === "tall" ? "bento-tall" : "";
        var tags = p.tags.map(function (t) {
          return '<span class="tag">' + t + '</span>';
        }).join("");

        return '<a href="' + p.url + '" target="_blank" rel="noopener" class="bento-card ' + bentoClass + '">' +
          '<div class="bento-card-top">' +
            '<div class="bento-icon" data-icon="' + p.icon + '">' + siteIcon(p.icon) + '</div>' +
            '<div class="bento-arrow"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg></div>' +
          '</div>' +
          '<div>' +
            '<h3>' + p.title + '</h3>' +
            '<p>' + p.description + '</p>' +
            '<div class="card-tags">' + tags + '</div>' +
          '</div>' +
        '</a>';
      }).join("");

      /* Journal posts (WordPress API) — row-style list */
      var API = CONFIG.wordpressApi + "?_embed&per_page=3";

      function strip(html) {
        var el = document.createElement("div");
        el.innerHTML = html;
        return el.textContent || "";
      }
      function fmtDate(d) {
        return new Intl.DateTimeFormat("en-US", { year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(d));
      }

      fetch(API)
        .then(function (r) { return r.json(); })
        .then(function (posts) {
          if (!posts.length) {
            $("#journal-list").innerHTML = '<p class="journal-empty">New posts coming soon.</p>';
            return;
          }
          $("#journal-list").innerHTML = posts.map(function (post) {
            var title = strip(post.title.rendered) || "Untitled";
            return '<a href="' + post.link + '" target="_blank" rel="noopener" class="journal-item reveal">' +
              '<div class="journal-item-meta">' +
                '<span class="journal-tag">Journal</span>' +
                '<time>' + fmtDate(post.date) + '</time>' +
              '</div>' +
              '<h3>' + title + '</h3>' +
            '</a>';
          }).join("");

          document.querySelectorAll(".journal-item").forEach(function (el) {
            obs.observe(el);
          });
        })
        .catch(function () {
          $("#journal-list").innerHTML = '<p class="journal-empty">Could not load posts. <a href="https://theofficeofnils.wordpress.com" target="_blank" rel="noopener">Visit the blog directly.</a></p>';
        });

      /* About */
      $("#about-logo").innerHTML = CONFIG.logo(140);
      $("#about-bio").textContent = CONFIG.author.bio;

      $("#social-links").innerHTML = Object.keys(CONFIG.author.social).map(function (key) {
        return '<a href="' + CONFIG.author.social[key] + '" target="_blank" rel="noopener" class="social-link" data-icon="' + key + '" aria-label="' + key + '">' +
          siteIcon(key) + '</a>';
      }).join("");

      /* Locations — map cards */
      if (CONFIG.author.locations) {
        $("#locations-grid").innerHTML = CONFIG.author.locations.map(function (loc) {
          return '<div class="location-card reveal">' +
            '<iframe class="location-map" src="' + loc.embed + '" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>' +
            '<div class="location-info">' +
              '<div class="location-label">' + loc.label + '</div>' +
              '<div class="location-name">' + loc.name + '</div>' +
            '</div>' +
          '</div>';
        }).join("");
      }

      /* Staggered scroll-triggered reveals */
      var items = document.querySelectorAll(".bento-card, .section-header, .about-layout, .hero-photo, .location-card");
      items.forEach(function (el) { el.classList.add("reveal"); });
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }
        });
      }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });
      items.forEach(function (el) { obs.observe(el); });

    })();
  </script>
</body>
</html>
