<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – The Office of Nils Johansson</title>
  <meta name="description" content="Technical dispatches and cultural reflections from field engineering deployments around the world.">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="icon" href="/assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <nav id="site-nav"></nav>

  <main>
    <section class="page-hero">
      <h1>Blog</h1>
      <p>The latest stories from <a href="https://theofficeofnils.wordpress.com" target="_blank" rel="noopener" style="color:var(--accent)">theofficeofnils.wordpress.com</a></p>
    </section>

    <div class="page-content">
      <div id="status" class="status-banner">Fetching the most recent posts&hellip;</div>
      <div id="posts"></div>
    </div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="/config.js"></script>
  <script src="/shared.js"></script>
  <script>
    (function () {
      "use strict";

      var postsContainer = document.getElementById("posts");
      var statusBanner = document.getElementById("status");
      var API = "https://public-api.wordpress.com/wp/v2/sites/theofficeofnils.wordpress.com/posts?_embed&per_page=6";

      function strip(html) {
        var el = document.createElement("div");
        el.innerHTML = html;
        return el.textContent || "";
      }

      function safeText(input) {
        return strip(input || "").trim();
      }

      function fmtDate(dateStr) {
        return new Intl.DateTimeFormat("en-US", { dateStyle: "long" }).format(new Date(dateStr));
      }

      function buildTags(post) {
        var terms = (post._embedded && post._embedded["wp:term"]) || [];
        var flat = [].concat.apply([], terms);
        return flat
          .filter(function (t) { return t.taxonomy === "post_tag"; })
          .slice(0, 5)
          .map(function (t) { return '<span class="tag">' + safeText(t.name) + '</span>'; })
          .join("");
      }

      function buildPostCard(post) {
        var title = safeText(post.title.rendered) || "Untitled";
        var excerpt = safeText(post.excerpt.rendered);
        var summary = excerpt.length > 220 ? excerpt.slice(0, 217) + "\u2026" : excerpt;
        var tags = buildTags(post);
        var author = (post._embedded && post._embedded.author && post._embedded.author[0])
          ? safeText(post._embedded.author[0].name) : "Nils Johansson";

        return '<article class="post-card">' +
          '<h2><a href="' + post.link + '" target="_blank" rel="noopener">' + title + '</a></h2>' +
          '<div class="meta">By ' + author + ' &ndash; ' + fmtDate(post.date) + '</div>' +
          '<p>' + (summary || "Visit the blog to read the full story.") + '</p>' +
          (tags ? '<div class="tags">' + tags + '</div>' : '') +
          '<div class="read-more"><a href="' + post.link + '" target="_blank" rel="noopener">Read the full article &rarr;</a></div>' +
        '</article>';
      }

      fetch(API)
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (posts) {
          if (!posts.length) {
            statusBanner.textContent = "No posts are available yet. Check back soon.";
            return;
          }
          statusBanner.remove();
          postsContainer.innerHTML = posts.map(buildPostCard).join("");
        })
        .catch(function () {
          statusBanner.textContent = "Could not reach the blog right now. Try refreshing in a moment.";
        });
    })();
  </script>
</body>
</html>
